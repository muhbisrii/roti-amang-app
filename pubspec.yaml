name: keuangan_roti
description: "Aplikasi pencatatan keuangan Roti Bakar Amang"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^2.32.0
  cloud_firestore: ^4.17.0
  google_fonts: ^6.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # ALAT PEMBUAT LOGO
  flutter_launcher_icons: ^0.13.1

# PENGATURAN LOGO APLIKASI
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logoamang.png"
  min_sdk_android: 21 

flutter:
  uses-material-design: true
  assets:
    - assets/